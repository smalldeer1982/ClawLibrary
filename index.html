<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>龙虾图书馆 / ClawLibrary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg0: #0d1716;
        --bg1: #163532;
        --ink: rgba(236, 247, 243, 0.92);
        --muted: rgba(152, 181, 172, 0.9);
        --line: rgba(171, 218, 201, 0.22);
        --accent: #ff7f50;
        --accent-2: #45d1b3;
        --panel: rgba(10, 25, 23, 0.4);
        --panel-strong: rgba(10, 24, 22, 0.56);
        --shadow: rgba(0, 0, 0, 0.34);
        --stage-left-gutter: 64px;
        --stage-right-gutter: 194px;
        --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", sans-serif;
        --font-mono: "SFMono-Regular", "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        --font-display: "VT323", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", sans-serif;
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #091110;
        color: var(--ink);
        font-family: var(--font-sans);
      }

      body {
        background:
          linear-gradient(180deg, #16191d 0%, #12171b 24%, #0e1418 52%, #0a1115 78%, #080d11 100%),
          linear-gradient(135deg, rgba(72, 95, 108, 0.12) 0%, rgba(72, 95, 108, 0.04) 36%, rgba(46, 84, 74, 0.06) 72%, rgba(0, 0, 0, 0) 100%);
      }

      #app {
        position: fixed;
        inset: 0 var(--stage-right-gutter) 0 var(--stage-left-gutter);
        width: auto;
        height: auto;
        background: transparent;
      }

      #app canvas {
        background: transparent !important;
      }

      .menu-panel {
        position: fixed;
        z-index: 115;
        top: 12px;
        right: 8px;
        width: min(180px, calc(100vw - 16px));
        max-height: calc(100vh - 24px);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-radius: 14px;
        border: 1px solid rgba(171, 218, 201, 0.14);
        background: linear-gradient(180deg, rgba(12, 29, 27, 0.56), rgba(8, 21, 19, 0.38));
        backdrop-filter: blur(10px);
        background-clip: padding-box;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        overflow: hidden;
      }

      .menu-panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .menu-panel-stamp {
        font-family: "VT323", monospace;
        font-size: 22px;
        line-height: 0.9;
        color: var(--accent);
        text-shadow: 0 2px 10px rgba(255, 127, 80, 0.16);
      }

      .menu-panel-sub {
        margin-top: 2px;
        color: rgba(152, 181, 172, 0.86);
        font-size: 9px;
        line-height: 1.2;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .menu-panel-meta {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
      }

      .menu-panel-meta-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }

      .meta-toggle {
        border: 1px solid rgba(171, 218, 201, 0.34);
        border-radius: 999px;
        padding: 4px 9px;
        background: rgba(9, 24, 22, 0.72);
        color: #d6eee5;
        font-family: "VT323", monospace;
        font-size: 13px;
        line-height: 1;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition:
          border-color 120ms ease,
          transform 120ms ease,
          background 120ms ease,
          color 120ms ease;
      }

      .meta-toggle:hover {
        border-color: rgba(171, 218, 201, 0.72);
        background: rgba(12, 31, 28, 0.86);
        color: #f0fff9;
        transform: translateY(-1px);
      }

      .meta-toggle:disabled {
        opacity: 0.52;
        cursor: default;
        transform: none;
      }

      .meta-toggle[data-active="true"] {
        border-color: rgba(126, 202, 184, 0.74);
        background: rgba(19, 46, 48, 0.84);
        color: #a8ecd7;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .resource-menu {
        display: grid;
        gap: 6px;
        overflow: auto;
        padding-right: 2px;
      }

      .resource-menu button {
        --accent-color: var(--accent-2);
        position: relative;
        width: 100%;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(171, 218, 201, 0.18);
        border-radius: 10px;
        background: rgba(9, 24, 22, 0.56);
        color: var(--ink);
        padding: 6px 7px 6px 10px;
        text-align: left;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        transition:
          transform 120ms ease,
          border-color 120ms ease,
          background 120ms ease,
          box-shadow 120ms ease;
      }

      .resource-menu button::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--accent-color);
        box-shadow: 0 0 12px var(--accent-color);
      }

      .resource-menu button:hover {
        transform: translateY(-1px);
        border-color: rgba(171, 218, 201, 0.42);
        background: rgba(10, 26, 24, 0.74);
      }

      .resource-menu button:disabled {
        cursor: default;
        opacity: 0.74;
      }

      .resource-menu button[data-status="active"] {
        border-color: color-mix(in srgb, var(--accent-color) 46%, rgba(171, 218, 201, 0.16));
      }

      .resource-menu button[data-status="alert"] {
        border-color: rgba(255, 105, 120, 0.72);
        background: rgba(48, 17, 21, 0.52);
      }

      .resource-menu button[data-status="offline"] {
        border-color: rgba(171, 218, 201, 0.12);
        background: rgba(8, 18, 18, 0.48);
        opacity: 0.84;
      }

      .resource-menu button[data-focus="true"] {
        border-color: var(--accent-color);
        background: rgba(11, 30, 27, 0.78);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.05),
          0 0 0 1px color-mix(in srgb, var(--accent-color) 28%, transparent);
      }

      .resource-menu button[data-selected="true"] {
        background: rgba(12, 33, 30, 0.82);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.05),
          0 0 0 1px rgba(255, 214, 134, 0.18);
      }

      .resource-menu button[data-selected="true"][data-focus="true"] {
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.05),
          0 0 0 1px rgba(255, 214, 134, 0.22),
          0 0 0 2px color-mix(in srgb, var(--accent-color) 24%, transparent);
      }

      .resource-menu-empty {
        padding: 10px 2px 2px;
        color: rgba(152, 181, 172, 0.86);
        font-size: 12px;
      }

      .resource-menu-main {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .resource-menu-name {
        font-family: "VT323", monospace;
        font-size: 16px;
        line-height: 0.92;
        color: var(--accent-color);
      }

      .resource-menu-detail {
        color: rgba(152, 181, 172, 0.82);
        font-size: 9px;
        line-height: 1.15;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .resource-menu-count {
        font-family: "VT323", monospace;
        font-size: 19px;
        line-height: 0.9;
        color: rgba(244, 255, 247, 0.88);
        justify-self: end;
      }

      .hud-title {
        position: fixed;
        left: 18px;
        top: 18px;
        z-index: 110;
        max-width: min(360px, calc(100vw - 260px));
        display: grid;
        gap: 4px;
        pointer-events: none;
        isolation: isolate;
      }

      .hud-title::before {
        content: none;
      }

      .hud-title-main {
        color: rgba(244, 255, 247, 0.92);
        font-family: "VT323", monospace;
        font-size: clamp(24px, 2.3vw, 38px);
        font-weight: 400;
        letter-spacing: 0.03em;
        line-height: 0.9;
        text-shadow:
          0 2px 14px rgba(0, 0, 0, 0.32),
          0 1px 0 rgba(0, 0, 0, 0.4);
      }

      .hud-title-sub {
        max-width: 300px;
        color: rgba(204, 225, 217, 0.76);
        font-size: 10px;
        line-height: 1.35;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      }

      .hud-activity {
        position: fixed;
        z-index: 110;
        left: 18px;
        bottom: 18px;
        width: min(360px, calc(100vw - 36px));
        display: grid;
        gap: 10px;
        pointer-events: auto;
        transition:
          opacity 140ms ease,
          transform 140ms ease;
        isolation: isolate;
      }

      .hud-activity::before {
        content: none;
      }

      body.info-collapsed .hud-activity {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
      }

      .hud-activity-toggle {
        position: fixed;
        z-index: 116;
        left: 18px;
        bottom: 184px;
        border: 1px solid rgba(171, 218, 201, 0.34);
        border-radius: 999px;
        padding: 4px 9px;
        background: rgba(9, 24, 22, 0.74);
        color: #d6eee5;
        font-family: "VT323", monospace;
        font-size: 14px;
        line-height: 1;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition:
          bottom 140ms ease,
          border-color 120ms ease,
          transform 120ms ease,
          background 120ms ease,
          color 120ms ease;
      }

      .hud-activity-toggle:hover {
        border-color: rgba(171, 218, 201, 0.72);
        background: rgba(12, 31, 28, 0.86);
        color: #f0fff9;
        transform: translateY(-1px);
      }

      body.info-collapsed .hud-activity-toggle {
        bottom: 18px;
      }

      .hud-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: baseline;
      }

      .hud-stat {
        display: grid;
        gap: 1px;
      }

      .hud-stat-value {
        color: rgba(244, 255, 247, 0.92);
        font-family: "VT323", monospace;
        font-size: 25px;
        line-height: 0.88;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
      }

      .hud-stat-label {
        color: rgba(152, 181, 172, 0.82);
        font-size: 8px;
        line-height: 1.1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hud-activity-title {
        color: rgba(242, 255, 249, 0.88);
        font-family: "VT323", monospace;
        font-size: 17px;
        line-height: 0.95;
        letter-spacing: 0.04em;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      }

      .hud-actor-status {
        display: grid;
        gap: 2px;
      }

      .hud-actor-status strong {
        display: block;
        color: rgba(244, 255, 247, 0.9);
        font-family: "VT323", monospace;
        font-size: 15px;
        line-height: 0.95;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
      }

      .hud-actor-status span {
        display: block;
        color: rgba(204, 225, 217, 0.74);
        font-size: 10px;
        line-height: 1.28;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.26);
      }

      .hud-activity-items {
        display: grid;
        gap: 6px;
      }

      .hud-activity-group {
        display: grid;
        gap: 5px;
      }

      .hud-activity-group-toggle {
        display: grid;
        gap: 2px;
        padding: 0;
        border: 0;
        background: none;
        text-align: left;
        cursor: pointer;
        transition:
          transform 120ms ease,
          opacity 120ms ease;
      }

      .hud-activity-group-toggle:hover {
        transform: translateX(2px);
      }

      .hud-activity-group-toggle:hover strong,
      .hud-activity-group-toggle:hover span {
        opacity: 1;
      }

      .hud-activity-group-items {
        display: grid;
        gap: 5px;
        padding-left: 10px;
        border-left: 1px solid rgba(126, 202, 184, 0.22);
      }

      .hud-activity-group-toggle strong {
        display: block;
        font-family: "VT323", monospace;
        font-size: 15px;
        line-height: 0.95;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
      }

      .hud-activity-group-toggle span {
        display: block;
        color: rgba(204, 225, 217, 0.74);
        font-size: 10px;
        line-height: 1.28;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.26);
      }

      .hud-activity-group[data-open="true"] .hud-activity-group-toggle strong {
        color: rgba(244, 255, 247, 0.96);
      }

      .hud-activity-item {
        display: grid;
        gap: 2px;
        padding: 0;
        border: 0;
        background: none;
      }

      button.hud-activity-item {
        text-align: left;
        cursor: pointer;
        transition:
          transform 120ms ease,
          opacity 120ms ease;
      }

      button.hud-activity-item:hover {
        transform: translateX(2px);
      }

      button.hud-activity-item:hover strong,
      button.hud-activity-item:hover span {
        opacity: 1;
      }

      .hud-activity-item strong {
        display: block;
        font-family: "VT323", monospace;
        font-size: 14px;
        line-height: 0.95;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
      }

      .hud-activity-item span {
        display: block;
        margin-top: 0;
        color: rgba(204, 225, 217, 0.74);
        font-size: 10px;
        line-height: 1.28;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.26);
        opacity: 0.92;
      }

      .gateway-category-menu.hidden {
        display: none;
      }

      .gateway-category-menu {
        position: fixed;
        inset: 0;
        z-index: 140;
        pointer-events: none;
      }

      .debug-overlay.hidden {
        display: none;
      }

      .debug-overlay {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 118;
        width: min(228px, calc(100vw - 28px));
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(171, 218, 201, 0.14);
        background: linear-gradient(180deg, rgba(10, 24, 22, 0.84), rgba(7, 18, 17, 0.74));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
        pointer-events: none;
        background-clip: padding-box;
      }

      .debug-overlay-head {
        color: rgba(244, 255, 247, 0.94);
        font-family: "VT323", monospace;
        font-size: 19px;
        line-height: 0.92;
      }

      .debug-overlay-sub {
        margin-top: 3px;
        color: rgba(152, 181, 172, 0.82);
        font-size: 9px;
        line-height: 1.2;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .debug-overlay-grid {
        margin-top: 8px;
        display: grid;
        grid-template-columns: minmax(0, auto) minmax(0, 1fr);
        gap: 6px 10px;
        align-items: baseline;
      }

      .debug-overlay-label {
        color: rgba(152, 181, 172, 0.74);
        font-size: 9px;
        line-height: 1.15;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .debug-overlay-value {
        color: rgba(236, 247, 243, 0.9);
        font-family: "SFMono-Regular", "Consolas", monospace;
        font-size: 11px;
        line-height: 1.3;
        word-break: break-word;
      }

      .gateway-category-panel {
        position: absolute;
        display: grid;
        gap: 6px;
        pointer-events: auto;
        padding: 6px;
        border-radius: 14px;
        border: 1px solid rgba(171, 218, 201, 0.18);
        background: linear-gradient(180deg, rgba(10, 24, 22, 0.92), rgba(8, 20, 19, 0.82));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 10px 22px rgba(0, 0, 0, 0.22);
      }

      .gateway-category-menu[data-layout="petal"]::before {
        content: '';
        position: absolute;
        left: var(--gateway-center-x, 50vw);
        top: var(--gateway-center-y, 40vh);
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 1px solid rgba(171, 218, 201, 0.46);
        background: rgba(13, 35, 32, 0.88);
        box-shadow:
          0 0 0 6px rgba(69, 209, 179, 0.08),
          0 0 18px rgba(69, 209, 179, 0.22);
        transform: translate(-50%, -50%);
      }

      .gateway-category-chip {
        pointer-events: auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2px;
        border: 1px solid rgba(171, 218, 201, 0.3);
        border-radius: 12px;
        padding: 7px 9px;
        background: linear-gradient(180deg, rgba(10, 24, 22, 0.84), rgba(8, 20, 19, 0.66));
        color: rgba(236, 247, 243, 0.92);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 4px 10px rgba(0, 0, 0, 0.18);
        text-align: left;
        cursor: pointer;
        transition:
          border-color 120ms ease,
          background 120ms ease;
      }

      .gateway-category-chip.petal {
        position: absolute;
        left: var(--gateway-center-x, 50vw);
        top: var(--gateway-center-y, 40vh);
        width: auto;
        min-width: 108px;
        transform: translate(calc(-50% + var(--offset-x, 0px)), calc(-50% + var(--offset-y, 0px)));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 12px 24px rgba(0, 0, 0, 0.26);
      }

      .gateway-category-chip:hover {
        border-color: rgba(171, 218, 201, 0.62);
        background: linear-gradient(180deg, rgba(12, 30, 27, 0.92), rgba(10, 24, 22, 0.72));
      }

      .gateway-category-chip.petal:hover {
        transform: translate(calc(-50% + var(--offset-x, 0px)), calc(-50% + var(--offset-y, 0px) - 1px));
      }

      .gateway-category-chip span {
        color: rgba(236, 247, 243, 0.92);
        font-family: "VT323", monospace;
        font-size: 16px;
        line-height: 0.92;
      }

      .gateway-category-chip strong {
        color: rgba(152, 181, 172, 0.84);
        font-size: 9px;
        line-height: 1.1;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 600;
      }

      .menu-panel-stamp,
      .meta-toggle,
      .resource-menu-name,
      .resource-menu-count,
      .hud-title-main,
      .hud-activity-toggle,
      .hud-stat-value,
      .hud-activity-title,
      .hud-actor-status strong,
      .hud-activity-group-toggle strong,
      .hud-activity-item strong,
      .debug-overlay-head,
      .gateway-category-chip span,
      .asset-modal-head strong,
      .modal-summary-chip strong,
      .modal-item-stat strong,
      .preview-modal-head strong,
      .preview-modal-tools button,
      .preview-code-head,
      .asset-action {
        font-family: var(--font-display) !important;
        letter-spacing: 0.01em;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
      }

      body[data-ui-locale="zh"] .menu-panel-stamp,
      body[data-ui-locale="zh"] .meta-toggle,
      body[data-ui-locale="zh"] .resource-menu-name,
      body[data-ui-locale="zh"] .resource-menu-count,
      body[data-ui-locale="zh"] .hud-title-main,
      body[data-ui-locale="zh"] .hud-activity-toggle,
      body[data-ui-locale="zh"] .hud-stat-value,
      body[data-ui-locale="zh"] .hud-actor-status strong,
      body[data-ui-locale="zh"] .hud-activity-group-toggle strong,
      body[data-ui-locale="zh"] .hud-activity-item strong,
      body[data-ui-locale="zh"] .debug-overlay-head,
      body[data-ui-locale="zh"] .gateway-category-chip span,
      body[data-ui-locale="zh"] .asset-modal-head strong,
      body[data-ui-locale="zh"] .modal-summary-chip strong,
      body[data-ui-locale="zh"] .modal-item-stat strong,
      body[data-ui-locale="zh"] .preview-modal-head strong,
      body[data-ui-locale="zh"] .preview-modal-tools button,
      body[data-ui-locale="zh"] .preview-code-head,
      body[data-ui-locale="zh"] .asset-action {
        font-family: var(--font-sans) !important;
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
      }

      .asset-modal.hidden {
        display: none;
      }

      .asset-modal {
        position: fixed;
        inset: 0;
        z-index: 150;
        background: rgba(4, 10, 14, 0.42);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
      }

      .asset-modal-card {
        width: min(780px, 92vw);
        max-height: 86vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-radius: 18px;
        border: 1px solid rgba(171, 218, 201, 0.24);
        background:
          linear-gradient(180deg, rgba(10, 24, 22, 0.86) 0%, rgba(8, 20, 19, 0.7) 100%);
        color: rgba(236, 247, 243, 0.92);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 18px 48px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(14px);
      }

      .asset-modal-head {
        display: grid;
        gap: 8px;
        padding: 10px 14px 8px;
        border-bottom: 1px solid rgba(171, 218, 201, 0.18);
        background: linear-gradient(180deg, rgba(12, 29, 27, 0.56), rgba(8, 21, 19, 0.24));
      }

      .asset-modal-head-top {
        display: grid;

      .modal-item-meta {
        margin-top: 4px;
        color: rgba(152, 181, 172, 0.78);
        font-size: 10px;
        line-height: 1.35;
        word-break: break-all;
      }

      .modal-item-path {
        font-family: "SFMono-Regular", "Consolas", monospace;
        font-size: 9px;
        color: rgba(168, 192, 184, 0.68);
      }

      .modal-item-excerpt {
        margin-top: 6px;
        color: rgba(227, 242, 236, 0.84);
        font-size: 11px;
        line-height: 1.42;
      }

      .modal-item-updated {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 0;
        border-radius: 0;
        background: transparent;
        color: rgba(205, 223, 216, 0.76);
        font-size: 9px;
        line-height: 1.15;
        letter-spacing: 0.02em;
      }

      .modal-item-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .modal-thumb {
        margin-top: 10px;
        max-width: 180px;
        max-height: 120px;
        display: block;
        border-radius: 6px;
        border: 1px solid rgba(171, 218, 201, 0.18);
        background: rgba(255,255,255,0.03);
        image-rendering: pixelated;
      }

      .search-hit {
        padding: 0 2px;
        border-radius: 4px;
        background: rgba(126, 202, 184, 0.28);
        color: #3f2b1f;
      }

      .asset-modal-items.grid .modal-thumb {
        width: 100%;
        max-width: none;
        max-height: 170px;
        object-fit: contain;
      }

      .asset-action {
        border: 1px solid rgba(171, 218, 201, 0.24);
        background: rgba(9, 24, 22, 0.72);
        color: rgba(236, 247, 243, 0.88);
        padding: 6px 9px;
        border-radius: 10px;
        font-size: 11px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .asset-action.ghost {
        border-color: rgba(171, 218, 201, 0.16);
        background: rgba(8, 20, 19, 0.54);
        color: rgba(204, 225, 217, 0.76);
      }

      .modal-empty {
        color: rgba(152, 181, 172, 0.82);
        font-size: 12px;
        padding: 8px 2px;
      }

      .preview-modal.hidden {
        display: none;
      }

      .preview-modal {
        position: fixed;
        inset: 0;
        z-index: 180;
        background: rgba(3, 8, 12, 0.6);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .preview-modal-card {
        width: min(980px, 94vw);
        max-height: 86vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-radius: 18px;
        border: 1px solid rgba(171, 218, 201, 0.24);
        background:
          linear-gradient(180deg, rgba(9, 23, 21, 0.94) 0%, rgba(7, 18, 17, 0.9) 100%);
        color: rgba(236, 247, 243, 0.92);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 22px 60px rgba(0, 0, 0, 0.34);
      }

      .preview-modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(171, 218, 201, 0.16);
        background: linear-gradient(180deg, rgba(12, 29, 27, 0.6), rgba(8, 21, 19, 0.28));
      }

      .preview-modal-head strong {
        display: block;
        color: rgba(244, 255, 247, 0.94);
        font-family: "VT323", monospace;
        font-size: 24px;
        line-height: 0.95;
      }

      .preview-modal-head span,
      .preview-modal-note {
        color: rgba(152, 181, 172, 0.84);
        font-size: 11px;
        line-height: 1.4;
      }

      .preview-modal-note {
        margin-top: 6px;
      }

      .preview-modal-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .preview-modal-body {
        min-height: 260px;
        overflow: auto;
        padding: 18px;
        background:
          radial-gradient(circle at top right, rgba(84, 188, 163, 0.08), transparent 32%),
          rgba(6, 15, 15, 0.86);
      }

      .preview-image-stage {
        min-height: 320px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(171, 218, 201, 0.12);
        border-radius: 14px;
        padding: 18px;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%) 0 0 / 20px 20px,
          linear-gradient(-45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%) 0 0 / 20px 20px,
          rgba(6, 15, 15, 0.88);
      }

      .preview-image {
        max-width: 100%;
        max-height: calc(86vh - 180px);
        object-fit: contain;
        image-rendering: pixelated;
      }

      .preview-text {
        margin: 0;
        padding: 16px 18px;
        border: 1px solid rgba(171, 218, 201, 0.12);
        border-radius: 14px;
        background: rgba(8, 19, 19, 0.82);
        color: rgba(230, 242, 238, 0.9);
        font-family: "SFMono-Regular", "Consolas", monospace;
        font-size: 11px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .preview-markdown {
        padding: 18px 20px;
        border: 1px solid rgba(171, 218, 201, 0.12);
        border-radius: 14px;
        background: rgba(8, 19, 19, 0.82);
        color: rgba(230, 242, 238, 0.9);
        line-height: 1.65;
      }

      .preview-markdown > :first-child {
        margin-top: 0;
      }

      .preview-markdown > :last-child {
        margin-bottom: 0;
      }

      .preview-markdown h1,
      .preview-markdown h2,
      .preview-markdown h3,
      .preview-markdown h4,
      .preview-markdown h5,
      .preview-markdown h6 {
        margin: 1.1em 0 0.45em;
        color: rgba(244, 255, 247, 0.95);
        font-family: "VT323", monospace;
        line-height: 1;
        letter-spacing: 0.02em;
      }

      .preview-markdown h1 {
        font-size: 30px;
      }

      .preview-markdown h2 {
        font-size: 25px;
      }

      .preview-markdown h3 {
        font-size: 21px;
      }

      .preview-markdown p,
      .preview-markdown ul,
      .preview-markdown ol,
      .preview-markdown blockquote,
      .preview-markdown pre {
        margin: 0.8em 0;
      }

      .preview-markdown ul,
      .preview-markdown ol {
        padding-left: 1.4em;
      }

      .preview-markdown blockquote {
        padding-left: 12px;
        border-left: 3px solid rgba(126, 202, 184, 0.4);
        color: rgba(186, 214, 204, 0.88);
      }

      .preview-markdown code {
        padding: 1px 5px;
        border-radius: 6px;
        background: rgba(126, 202, 184, 0.14);
        color: rgba(244, 255, 247, 0.94);
        font-family: "SFMono-Regular", "Consolas", monospace;
        font-size: 0.95em;
      }

      .preview-markdown pre {
        padding: 14px 16px;
        border-radius: 12px;
        overflow: auto;
        background: rgba(5, 13, 13, 0.92);
      }

      .preview-markdown pre code {
        padding: 0;
        background: transparent;
      }

      .preview-markdown a {
        color: #86dec5;
      }

      .preview-empty {
        padding: 14px 4px;
        color: rgba(152, 181, 172, 0.84);
        font-size: 12px;
      }

      .asset-modal-body,
      .preview-modal-body,
      .modal-context-events {
        scrollbar-width: thin;
        scrollbar-color: rgba(126, 202, 184, 0.42) rgba(8, 20, 19, 0.38);
      }

      .asset-modal-body::-webkit-scrollbar,
      .preview-modal-body::-webkit-scrollbar,
      .modal-context-events::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .asset-modal-body::-webkit-scrollbar-track,
      .preview-modal-body::-webkit-scrollbar-track,
      .modal-context-events::-webkit-scrollbar-track {
        border-radius: 999px;
        background: rgba(8, 20, 19, 0.42);
      }

      .asset-modal-body::-webkit-scrollbar-thumb,
      .preview-modal-body::-webkit-scrollbar-thumb,
      .modal-context-events::-webkit-scrollbar-thumb {
        border: 2px solid transparent;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(126, 202, 184, 0.5), rgba(93, 163, 147, 0.34));
        background-clip: padding-box;
      }

      @media (max-width: 700px) {
        :root {
          --stage-left-gutter: 0px;
          --stage-right-gutter: 0px;
        }

        .asset-modal {
          padding: 12px;
        }

        .asset-modal-card {
          width: 100%;
          max-height: 86vh;
        }

        .preview-modal {
          padding: 12px;
        }

        .preview-modal-card {
          width: 100%;
          max-height: 88vh;
        }

        .preview-modal-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .preview-modal-body {
          padding: 14px;
        }

        .gateway-category-chip {
          padding: 6px 8px;
        }

        .gateway-category-chip span {
          font-size: 15px;
        }

        .debug-overlay {
          right: 10px;
          bottom: 10px;
          width: min(210px, calc(100vw - 20px));
          padding: 9px 10px;
        }

        .menu-panel {
          top: 10px;
          left: 10px;
          right: 10px;
          width: auto;
          max-height: none;
          padding: 10px 10px 8px;
          gap: 8px;
          border-radius: 16px;
        }

        .menu-panel-head {
          flex-direction: row;
          align-items: flex-start;
          justify-content: space-between;
        }

        .menu-panel-stamp {
          font-size: 20px;
        }

        .menu-panel-sub {
          display: none;
        }

        .menu-panel-meta {
          align-items: flex-end;
          gap: 5px;
        }

        .menu-panel-meta-row {
          justify-content: flex-end;
        }

        .meta-toggle {
          font-size: 12px;
          padding: 4px 9px;
        }

        .resource-menu {
          display: flex;
          gap: 8px;
          overflow-x: auto;
          overflow-y: hidden;
          padding: 2px 2px 4px 0;
          scroll-snap-type: x proximity;
        }

        .resource-menu button {
          flex: 0 0 146px;
          width: 146px;
          padding: 8px 10px 8px 11px;
          gap: 8px;
          scroll-snap-align: start;
        }

        .resource-menu-name {
          font-size: 15px;
        }

        .resource-menu-count {
          font-size: 16px;
        }

        .resource-menu-detail {
          font-size: 8px;
        }

        .hud-title {
          left: 10px;
          top: 102px;
          max-width: min(190px, calc(100vw - 20px));
          gap: 2px;
        }

        .hud-title::before {
          display: none;
        }

        .hud-title-main {
          font-size: clamp(20px, 6vw, 24px);
        }

        .hud-title-sub {
          display: none;
        }

        .hud-activity::before {
          inset: -10px -10px -10px -8px;
        }

        .hud-activity {
          left: 10px;
          right: 10px;
          bottom: 10px;
          width: auto;
          max-width: min(340px, calc(100vw - 20px));
          gap: 8px;
        }

        .hud-activity-toggle {
          left: 10px;
          bottom: 148px;
          padding: 4px 9px;
          font-size: 15px;
        }

        body.info-collapsed .hud-activity-toggle {
          bottom: 10px;
        }

        .hud-stats {
          gap: 12px;
        }

        .hud-stat-value {
          font-size: 24px;
        }

        .hud-activity-title {
          font-size: 18px;
        }

        .asset-modal-head {
          gap: 10px;
        }

        .asset-modal-head-top {
          grid-template-columns: 1fr;
        }

        .asset-modal-tools {
          width: 100%;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .asset-modal-actions {
          width: 100%;
          justify-content: flex-start;
        }

        .asset-modal-tools input {
          grid-column: 1 / -1;
          min-width: 0;
          width: 100%;
        }

        .asset-modal-shortcuts {
          white-space: normal;
          padding: 2px 0 0 0;
        }

        .asset-modal-tools select,
        .asset-modal-tools button {
          width: 100%;
        }

        .asset-modal-context {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .asset-modal-summary {
          padding-bottom: 4px;
        }

        .modal-summary-chip {
          flex: 0 0 auto;
          min-width: 98px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud-title">
      <div class="hud-title-main" id="hud-title-main">龙虾图书馆 / ClawLibrary</div>
      <div class="hud-title-sub" id="hud-title-sub">Pixel archive for OpenClaw flows.</div>
    </div>
    <div class="hud-activity" id="hud-activity">
      <div class="hud-stats" id="hud-stats"></div>
      <div class="hud-actor-status" id="hud-actor-status"></div>
      <div class="hud-activity-items" id="hud-activity-items"></div>
    </div>
    <button class="hud-activity-toggle" id="toggle-info-panel" type="button">Hide Info</button>
    <div class="gateway-category-menu hidden" id="gateway-category-menu" aria-hidden="true"></div>
    <aside class="menu-panel" aria-label="Quick resource menu">
      <div class="menu-panel-head">
        <div>
          <div class="menu-panel-stamp" id="menu-panel-stamp">ARCHIVE LIVE</div>
          <div class="menu-panel-sub" id="menu-panel-sub">Quick room routing</div>
        </div>
        <div class="menu-panel-meta">
          <div class="menu-panel-meta-row">
            <button class="meta-toggle" id="cycle-theme" type="button" hidden>Theme</button>
            <button class="meta-toggle" id="toggle-locale" type="button">EN / 中</button>
            <button class="meta-toggle" id="toggle-debug" type="button">Debug</button>
          </div>
          <button class="meta-toggle" id="toggle-actor-skin" type="button">Claw</button>
        </div>
      </div>
      <div class="resource-menu" id="resource-menu"></div>
    </aside>
    <div class="debug-overlay hidden" id="debug-overlay" aria-hidden="true"></div>
    <div class="asset-modal hidden" id="asset-modal" aria-hidden="true">
      <div class="asset-modal-card">
        <div class="asset-modal-head">
          <div class="asset-modal-head-top">
            <div class="asset-modal-head-main">
              <strong id="asset-modal-title">Resource</strong>
              <span id="asset-modal-sub">Loading…</span>
              <div class="asset-modal-feedback" id="asset-modal-feedback"></div>
            </div>
            <div class="asset-modal-actions">
              <button id="asset-modal-copy-context" type="button">Copy Context</button>
              <button id="asset-modal-view" type="button">Grid</button>
              <div class="asset-modal-shortcuts" id="asset-modal-shortcuts">Shortcuts · / Search · ⇧C Copy Context · Esc Close</div>
              <button id="asset-modal-close" class="asset-modal-close" type="button">Close</button>
            </div>
          </div>
          <div class="asset-modal-tools">
            <input id="asset-modal-search" type="search" placeholder="Search items…" />
            <select id="asset-modal-kind">
              <option value="all">All Kinds</option>
            </select>
            <select id="asset-modal-sort">
              <option value="priority">Recommended</option>
              <option value="date-desc">Newest</option>
              <option value="date-asc">Oldest</option>
              <option value="size-desc">Largest</option>
              <option value="size-asc">Smallest</option>
            </select>
          </div>
        </div>
        <div class="asset-modal-body">
          <div class="asset-modal-context" id="asset-modal-context"></div>
          <div class="asset-modal-summary" id="asset-modal-summary"></div>
          <div class="asset-modal-items" id="asset-modal-items"></div>
        </div>
      </div>
    </div>
    <div class="preview-modal hidden" id="preview-modal" aria-hidden="true">
      <div class="preview-modal-card">
        <div class="preview-modal-head">
          <div>
            <strong id="preview-modal-title">Preview</strong>
            <span id="preview-modal-sub">Loading…</span>
            <div class="preview-modal-note" id="preview-modal-note"></div>
          </div>
          <div class="preview-modal-tools">
            <button id="preview-modal-folder" class="asset-action ghost" type="button">Open Folder</button>
            <button id="preview-modal-close" class="asset-modal-close" type="button">Close</button>
          </div>
        </div>
        <div class="preview-modal-body" id="preview-modal-body"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
